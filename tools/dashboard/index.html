<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartKayak Dashboard</title>
<style>
  :root {
    --bg: #0e1116; --panel: #171c24; --edge: #2a3342; --ink: #d7e0ea;
    --dim: #7d8a99; --acc: #38b6ff; --ok: #3ddc84; --warn: #ffb347; --bad: #ff5c5c;
    font-size: 15px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font-family: "Segoe UI", system-ui, sans-serif; }
  header { display: flex; align-items: center; gap: 14px; padding: 10px 16px;
           background: var(--panel); border-bottom: 1px solid var(--edge); flex-wrap: wrap; }
  header h1 { font-size: 1.05rem; margin: 0; letter-spacing: .04em; color: var(--acc); }
  .badge { padding: 3px 12px; border-radius: 5px; font-weight: 600; font-size: .95rem;
           background: #333; color: #bbb; min-width: 9.5em; text-align: center; }
  .badge.MANUAL         { background: #1d4ed8; color: #fff; }
  .badge.HEADING_HOLD   { background: #0d9463; color: #fff; }
  .badge.ANCHOR, .badge.ANCHOR_HEADING { background: #7c3aed; color: #fff; }
  .badge.FAILSAFE       { background: var(--bad); color: #fff; }
  .badge.DISARMED, .badge.BOOT { background: #4b5563; color: #eee; }
  .pill { font-size: .85rem; color: var(--dim); }
  .pill b { color: var(--ink); }
  #conn { margin-left: auto; font-size: .85rem; }
  #conn.on  { color: var(--ok); }  #conn.off { color: var(--bad); }

  main { display: grid; gap: 12px; padding: 12px 16px;
         grid-template-columns: 320px 1fr; grid-template-rows: auto auto 1fr; }
  section { background: var(--panel); border: 1px solid var(--edge); border-radius: 8px;
            padding: 12px 14px; }
  h2 { margin: 0 0 8px; font-size: .8rem; text-transform: uppercase; letter-spacing: .1em;
       color: var(--dim); }

  #compassBox { grid-row: 1 / 3; display: flex; flex-direction: column; align-items: center; }
  canvas { display: block; }
  #hdgReadout { font-size: 1.5rem; font-variant-numeric: tabular-nums; margin-top: 4px; }
  #hdgReadout small { color: var(--dim); font-size: .85rem; }

  .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; }
  .stat { background: #10151d; border-radius: 6px; padding: 8px 10px; }
  .stat .k { font-size: .72rem; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }
  .stat .v { font-size: 1.25rem; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .stat .v.ok { color: var(--ok); } .stat .v.warn { color: var(--warn); } .stat .v.bad { color: var(--bad); }

  .thrust { display: flex; gap: 20px; align-items: center; }
  .tcol { flex: 1; }
  .tlabel { display: flex; justify-content: space-between; font-size: .85rem; color: var(--dim); }
  .tlabel b { color: var(--ink); font-variant-numeric: tabular-nums; }
  .bar { position: relative; height: 22px; background: #10151d; border-radius: 5px;
         overflow: hidden; margin-top: 4px; }
  .bar .zero { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--edge); }
  .bar .fill { position: absolute; top: 0; bottom: 0; background: var(--acc); transition: all .12s linear; }
  .bar .fill.rev { background: var(--warn); }

  #logBox { grid-column: 1 / 3; display: flex; flex-direction: column; min-height: 220px; }
  #log { flex: 1; overflow-y: auto; background: #0a0d12; border: 1px solid var(--edge);
         border-radius: 6px; padding: 8px 10px; font: 12px/1.5 Consolas, monospace;
         white-space: pre; color: #9fb2c5; }
  #log .cmd { color: var(--acc); }  #log .echo { color: var(--ok); }
  #cmdRow { display: flex; gap: 8px; margin-top: 8px; }
  #cmd { flex: 1; background: #0a0d12; border: 1px solid var(--edge); border-radius: 6px;
         color: var(--ink); padding: 8px 10px; font: 13px Consolas, monospace; }
  button { background: #222b38; color: var(--ink); border: 1px solid var(--edge);
           border-radius: 6px; padding: 7px 12px; cursor: pointer; font-size: .82rem; }
  button:hover { background: #2c3648; border-color: var(--acc); }
  #quick { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } #compassBox, #logBox { grid-column: 1; grid-row: auto; } }
</style>
</head>
<body>
<header>
  <h1>SMARTKAYAK</h1>
  <span id="mode" class="badge">—</span>
  <span class="pill">link <b id="link">—</b></span>
  <span class="pill">drop <b id="drop">—</b></span>
  <span class="pill" id="ancPill" style="display:none">anchor <b id="anc">—</b></span>
  <span id="conn" class="off">disconnected</span>
</header>

<main>
  <section id="compassBox">
    <h2>Heading</h2>
    <canvas id="compass" width="280" height="280"></canvas>
    <div id="hdgReadout">—° <small>sp —°</small></div>
  </section>

  <section>
    <h2>Thrust (applied)</h2>
    <div class="thrust">
      <div class="tcol">
        <div class="tlabel"><span>LEFT</span><b id="lval">+0.00</b></div>
        <div class="bar"><div class="zero"></div><div id="lbar" class="fill"></div></div>
      </div>
      <div class="tcol">
        <div class="tlabel"><span>RIGHT</span><b id="rval">+0.00</b></div>
        <div class="bar"><div class="zero"></div><div id="rbar" class="fill"></div></div>
      </div>
    </div>
  </section>

  <section>
    <h2>GPS</h2>
    <div class="grid2">
      <div class="stat"><div class="k">Fix</div><div class="v" id="fix">—</div></div>
      <div class="stat"><div class="k">Sats</div><div class="v" id="sats">—</div></div>
      <div class="stat"><div class="k">HDOP</div><div class="v" id="hdop">—</div></div>
      <div class="stat"><div class="k">Acc (m)</div><div class="v" id="acc">—</div></div>
      <div class="stat"><div class="k">COG</div><div class="v" id="cog">—</div></div>
    </div>
  </section>

  <section id="logBox">
    <h2>Console</h2>
    <div id="log"></div>
    <div id="cmdRow">
      <input id="cmd" placeholder="command… (kp 0.01, db 8, cal max, tune, stop)" autocomplete="off">
      <button onclick="sendCmd()">Send</button>
    </div>
    <div id="quick">
      <button onclick="sendQ('stop')">STOP</button>
      <button onclick="sendQ('log 0')">log 0</button>
      <button onclick="sendQ('log 5')">log 5</button>
      <button onclick="sendQ('cal max')">cal max</button>
      <button onclick="sendQ('cal compass')">cal compass</button>
      <button onclick="sendQ('tune')">tune</button>
    </div>
  </section>
</main>

<script>
"use strict";
// ---- Telemetry line parser (must track the firmware format in main.cpp) ----
// [MODE          ] L=+0.00 R=+0.00  hdg=174.1 cog=138 sp=  0.0  gps=7s/1.0 FIX acc=1.4  anc=2.1m@045  link=OK  drop=0
const RE = {
  mode: /^\[([A-Z_]+)\s*\]/,      lr:  /L=([+-][\d.]+)\s+R=([+-][\d.]+)/,
  hdg:  /hdg=\s*([\d.]+)/,        cog: /cog=\s*([\d.]+)/,
  sp:   /sp=\s*([\d.]+)/,         gps: /gps=(\d+)s\/([\d.]+)( FIX)?/,
  acc:  /acc=([\d.]+)/,           anc: /anc=(\(wait\))?([\d.]+)m@(\d+)/,
  link: /link=(OK|LOST)/,         drop:/drop=(\d+)/,
};
const $ = id => document.getElementById(id);
const state = { hdg: 0, sp: 0, cog: NaN };

function parseLine(ln) {
  if (!RE.mode.test(ln)) return false;           // not a telemetry line (echo etc.)
  let m;
  if ((m = RE.mode.exec(ln))) { $("mode").textContent = m[1]; $("mode").className = "badge " + m[1]; }
  if ((m = RE.lr.exec(ln)))   { setBar("l", parseFloat(m[1])); setBar("r", parseFloat(m[2])); }
  if ((m = RE.hdg.exec(ln)))  state.hdg = parseFloat(m[1]);
  state.cog = (m = RE.cog.exec(ln)) ? parseFloat(m[1]) : NaN;
  $("cog").textContent = isNaN(state.cog) ? "—" : state.cog.toFixed(0) + "°";
  if ((m = RE.sp.exec(ln)))   state.sp = parseFloat(m[1]);
  if ((m = RE.gps.exec(ln))) {
    $("sats").textContent = m[1];
    $("hdop").textContent = m[2];
    const fix = !!m[3];
    $("fix").textContent = fix ? "FIX" : "no fix";
    $("fix").className = "v " + (fix ? "ok" : "bad");
  }
  if ((m = RE.acc.exec(ln))) {
    const a = parseFloat(m[1]);
    $("acc").textContent = a > 50 ? "—" : a.toFixed(1);
    $("acc").className = "v " + (a <= 3 ? "ok" : a <= 8 ? "warn" : "bad");
  }
  if ((m = RE.anc.exec(ln))) {
    $("ancPill").style.display = "";
    $("anc").textContent = (m[1] ? "wait " : "") + m[2] + " m @ " + m[3] + "°";
  } else $("ancPill").style.display = "none";
  if ((m = RE.link.exec(ln))) { $("link").textContent = m[1]; $("link").style.color = m[1] === "OK" ? "var(--ok)" : "var(--bad)"; }
  if ((m = RE.drop.exec(ln))) { $("drop").textContent = m[1]; $("drop").style.color = m[1] === "0" ? "" : "var(--warn)"; }
  $("hdgReadout").innerHTML = state.hdg.toFixed(1) + "&deg; <small>sp " + state.sp.toFixed(1) + "&deg;</small>";
  drawCompass();
  return true;
}

function setBar(side, v) {
  $(side + "val").textContent = (v >= 0 ? "+" : "") + v.toFixed(2);
  const bar = $(side + "bar"), pct = Math.min(Math.abs(v), 1) * 50;
  bar.classList.toggle("rev", v < 0);
  if (v >= 0) { bar.style.left = "50%"; bar.style.width = pct + "%"; }
  else        { bar.style.left = (50 - pct) + "%"; bar.style.width = pct + "%"; }
}

// ---- Compass ----
const cv = $("compass"), cx = cv.getContext("2d");
function drawCompass() {
  const W = cv.width, C = W / 2, R = C - 14;
  cx.clearRect(0, 0, W, W);
  cx.strokeStyle = "#2a3342"; cx.lineWidth = 2;
  cx.beginPath(); cx.arc(C, C, R, 0, 7); cx.stroke();
  cx.fillStyle = "#7d8a99"; cx.font = "12px Segoe UI"; cx.textAlign = "center"; cx.textBaseline = "middle";
  for (let d = 0; d < 360; d += 30) {
    const a = (d - 90) * Math.PI / 180;
    const label = { 0:"N", 90:"E", 180:"S", 270:"W" }[d] || d;
    cx.fillText(label, C + Math.cos(a) * (R - 14), C + Math.sin(a) * (R - 14));
  }
  const needle = (deg, color, len, wid) => {
    const a = (deg - 90) * Math.PI / 180;
    cx.strokeStyle = color; cx.lineWidth = wid;
    cx.beginPath(); cx.moveTo(C, C);
    cx.lineTo(C + Math.cos(a) * len, C + Math.sin(a) * len); cx.stroke();
  };
  needle(state.sp, "#3ddc84", R - 30, 2);                        // setpoint
  if (!isNaN(state.cog)) needle(state.cog, "#ffb347", R - 40, 2); // GPS course
  needle(state.hdg, "#38b6ff", R - 24, 4);                        // heading
  cx.fillStyle = "#38b6ff"; cx.beginPath(); cx.arc(C, C, 5, 0, 7); cx.fill();
}
drawCompass();

// ---- Log + commands ----
const log = $("log");
function addLog(txt, cls) {
  const div = document.createElement("div");
  if (cls) div.className = cls;
  div.textContent = txt;
  log.appendChild(div);
  while (log.childNodes.length > 400) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}
function sendCmd() { const v = $("cmd").value.trim(); if (v) { sendQ(v); $("cmd").value = ""; } }
function sendQ(cmd) {
  if (ws && ws.readyState === 1) { ws.send(cmd); addLog(">>> " + cmd, "cmd"); }
  else addLog("(not connected)", "cmd");
}
$("cmd").addEventListener("keydown", e => { if (e.key === "Enter") sendCmd(); });

// ---- WebSocket (auto-reconnect) ----
let ws = null;
function connect() {
  // WebSocket lives on HTTP port + 1 (bridge convention; ESP32 will mirror it).
  const wsPort = (parseInt(location.port || "80", 10) + 1);
  const url = "ws://" + location.hostname + ":" + wsPort + "/ws";
  ws = new WebSocket(url);
  ws.onopen  = () => { $("conn").textContent = "connected"; $("conn").className = "on"; };
  ws.onclose = () => { $("conn").textContent = "disconnected"; $("conn").className = "off"; setTimeout(connect, 1500); };
  ws.onmessage = ev => {
    for (const ln of ev.data.split("\n")) {
      const t = ln.trim(); if (!t) continue;
      if (!parseLine(t)) addLog(t, t.startsWith(">>") ? "echo" : "");
      else if (window.showTelemetryInLog) addLog(t);
    }
  };
}
connect();
</script>
</body>
</html>
