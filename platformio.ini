; Smart Kayak Thruster Control System
; Two build targets from one codebase:
;   pio run -e mule   -> L298N H-bridge build (development rover)
;   pio run -e kayak  -> dual-ESC build (final fishing kayak)
;
; Target is selected by build flags. Source uses
;   #if defined(DRIVER_ESC) / #else   to pick the HAL driver, and
;   #if defined(PLATFORM_KAYAK)       to pick the PID gain set.
; build_src_filter compiles only the driver each target needs, so the
; mule build pulls in NO external libraries.

[env]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
build_flags = -I src

; ---- Development rover (L298N). Zero external dependencies. ----
[env:mule]
build_src_filter = +<*> -<hal/ESC_Driver.cpp> -<diag/>
build_flags = ${env.build_flags} -D PLATFORM_MULE -D DRIVER_L298N

; ---- Final kayak (dual ESC + 3PDT bypass). ----
[env:kayak]
build_src_filter = +<*> -<hal/L298N_Driver.cpp> -<diag/>
lib_deps = madhephaestus/ESP32Servo
build_flags = ${env.build_flags} -D PLATFORM_KAYAK -D DRIVER_ESC

; ---- Diagnostic: I2C bus scanner (Phase 2 bring-up). Compiles ONLY the
;      scanner, so it has its own setup()/loop() with no conflict. ----
[env:diag_i2c]
build_src_filter = +<diag/i2c_scan.cpp>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; ---- Diagnostic: raw IMU readout (L3G4200D + LSM303DLHC). ----
[env:diag_imu]
build_src_filter = +<diag/imu_raw.cpp> +<estimation/IMU.cpp>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; ---- Diagnostic: IMU calibration (gyro bias + mag hard/soft-iron). ----
[env:diag_calib]
build_src_filter = +<diag/imu_calib.cpp> +<estimation/IMU.cpp>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; ---- Diagnostic: flat magnetic heading (uses MAG_OFF/MAG_SCALE). ----
[env:diag_heading]
build_src_filter = +<diag/heading.cpp> +<estimation/IMU.cpp>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; ---- Diagnostic: compass vs gyro-fused heading. ----
[env:diag_fused]
build_src_filter = +<diag/heading_fused.cpp> +<estimation/IMU.cpp> +<estimation/Heading.cpp>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; Phase 2+ libraries are added when we write those modules (with names
; verified against the registry at that point):
;   GPS  (Phase 4): mikalhart/TinyGPSPlus
;   AHRS (Phase 2): the Madgwick orientation-fusion library
