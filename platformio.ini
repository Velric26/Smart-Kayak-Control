; Smart Kayak Thruster Control System
; Two build targets from one codebase, both on the dual bidirectional ESC HAL:
;   pio run -e mule   -> development rover  (PLATFORM_MULE gain set)
;   pio run -e kayak  -> final fishing kayak (PLATFORM_KAYAK gain set)
;
; The targets differ only in the PID gain set (#if defined(PLATFORM_KAYAK))
; and BT name / GPS dynamic model. (The L298N H-bridge driver was retired
; when the rover migrated to ESCs; see git history if you ever need it.)

[env]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
build_flags = -I src
lib_deps =
  madhephaestus/ESP32Servo
  mikalhart/TinyGPSPlus

; ---- Development rover (dual ESC). ----
[env:mule]
build_src_filter = +<*> -<diag/>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; ---- Final kayak (dual ESC + future 3PDT bypass). ----
[env:kayak]
build_src_filter = +<*> -<diag/>
build_flags = ${env.build_flags} -D PLATFORM_KAYAK

; ---- Diagnostic: I2C bus scanner (Phase 2 bring-up). Compiles ONLY the
;      scanner, so it has its own setup()/loop() with no conflict. ----
[env:diag_i2c]
build_src_filter = +<diag/i2c_scan.cpp>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; ---- Diagnostic: raw IMU readout (L3G4200D + LSM303DLHC). ----
[env:diag_imu]
build_src_filter = +<diag/imu_raw.cpp> +<estimation/IMU.cpp>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; ---- Diagnostic: IMU calibration (gyro bias + mag hard/soft-iron). ----
[env:diag_calib]
build_src_filter = +<diag/imu_calib.cpp> +<estimation/IMU.cpp>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; ---- Diagnostic: flat magnetic heading (uses MAG_OFF/MAG_SCALE). ----
[env:diag_heading]
build_src_filter = +<diag/heading.cpp> +<estimation/IMU.cpp>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; ---- Diagnostic: compass vs gyro-fused heading. ----
[env:diag_fused]
build_src_filter = +<diag/heading_fused.cpp> +<estimation/IMU.cpp> +<estimation/Heading.cpp>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; ---- Diagnostic: NEO-8M GPS bring-up (Phase 4). Standalone NMEA readout. ----
[env:diag_gps]
build_src_filter = +<diag/gps_raw.cpp>
lib_deps = mikalhart/TinyGPSPlus
build_flags = ${env.build_flags} -D PLATFORM_MULE

; ---- USB<->GPS transparent bridge: reconfigure the NEO-8M via the ESP32
;      (run tools/gps_config.py against the ESP32 port). No USB-UART needed. ----
[env:diag_gps_bridge]
build_src_filter = +<diag/gps_bridge.cpp>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; ---- Diagnostic: INA228 power monitors (UNVALIDATED - hardware incoming). ----
[env:diag_power]
build_src_filter = +<diag/power_mon.cpp> +<hal/PowerMonitor.cpp>
build_flags = ${env.build_flags} -D PLATFORM_MULE

; AHRS (Phase 2) library, if a Madgwick fusion upgrade is added later:
;   the Madgwick orientation-fusion library (name verified at that point)
